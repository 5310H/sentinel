name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Sentinel Firmware
    runs-on: ubuntu-latest
    
    # Use the official ESP-IDF v5.3 docker image which has everything pre-installed!
    container: espressif/idf:release-v5.3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          
      - name: Build with ESP-IDF
        run: |
          # The container already has ESP-IDF environment sourced
          idf.py build
          
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-firmware
          path: |
            build/sentinel-esp.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/sentinel-esp.elf
          retention-days: 7
