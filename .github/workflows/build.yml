name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Sentinel Firmware
    runs-on: ubuntu-latest
    
    # Use the official ESP-IDF v5.3 docker image which has everything pre-installed!
    container: espressif/idf:release-v5.3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false
          
      - name: Manually fetch top-level submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init --force
          
      - name: Build with ESP-IDF
        run: |
          # Inject the custom CMakeLists.txt into the submodule
          cp .github/noise-c-CMakeLists.txt components/noise-c/CMakeLists.txt
          cp .github/ed25519-randombytes-custom.h components/noise-c/src/crypto/ed25519/ed25519-randombytes-custom.h
          
          # Source ESP-IDF
          . /opt/esp/idf/export.sh
          
          # Set the target chip to ESP32-S3 and build
          idf.py set-target esp32s3
          idf.py build
          
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-firmware
          path: |
            build/sentinel-esp.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/sentinel-esp.elf
          retention-days: 7
